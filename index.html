<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eris Scan</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A66C2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0A0F1E; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app { width: 100%; max-width: 400px; background: #0F1422; border-radius: 32px 32px 0 0; box-shadow: 0 25px 50px -12px #000; overflow: hidden; position: relative; color: #fff; margin: 0 auto; }
        .header { padding: 20px 20px 12px; border-bottom: 1px solid #1F2740; }
        .brand h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #8A9CFF, #5D79F7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .brand p { font-size: 0.8rem; color: #8696BB; margin-top: -4px; }
        .camera-section { position: relative; background: #080C16; aspect-ratio: 1/1; width: 100%; overflow: hidden; }
        #reader { width: 100%; height: 100%; background: #000; }
        .scan-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        .scan-box { width: 70%; aspect-ratio: 1/1; border: 2px solid rgba(90,120,255,0.3); border-radius: 16px; position: relative; background: transparent; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); }
        .corner { position: absolute; width: 25px; height: 25px; border: 3px solid #5D79F7; }
        .tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-radius: 12px 0 0 0; }
        .tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-radius: 0 12px 0 0; }
        .bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-radius: 0 0 0 12px; }
        .br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-radius: 0 0 12px 0; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #8A9CFF, #5D79F7, transparent); top: 30%; animation: scan 2s linear infinite; opacity: 0.8; }
        @keyframes scan { 0% { top: 10%; } 50% { top: 70%; } 100% { top: 10%; } }
        .scan-text { margin-top: 16px; background: rgba(10,20,40,0.7); padding: 8px 16px; border-radius: 40px; font-size: 0.85rem; backdrop-filter: blur(4px); color: #CED8FF; }
        .translate-fab { position: absolute; bottom: 20px; right: 20px; width: 56px; height: 56px; background: #2A3A6A; border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,20,80,0.8); cursor: pointer; pointer-events: auto; z-index: 10; }
        .result-floating { background: #1A2340; margin: 16px 16px 8px; padding: 18px 16px; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
        .result-text { font-size: 0.95rem; color: #CCD9FF; word-break: break-all; background: #0D1326; padding: 14px 18px; border-radius: 24px; border: 1px solid #2B3760; margin-bottom: 15px; max-height: 100px; overflow-y: auto; }
        .result-buttons { display: flex; gap: 12px; margin-bottom: 6px; }
        .btn-primary { background: #3A5FCF; border: none; padding: 12px 18px; border-radius: 40px; font-weight: 600; color: white; flex: 2; cursor: pointer; font-size: 0.95rem; }
        .btn-outline { background: transparent; border: 1.5px solid #3F4E7A; padding: 12px 18px; border-radius: 40px; color: #B0C2FF; font-weight: 500; flex: 1; cursor: pointer; }
        .install-btn { width: 100%; background: #1D2A4A; border: 1px solid #3F5A9C; color: white; padding: 12px; border-radius: 40px; margin-top: 8px; cursor: pointer; font-weight: 500; }
        .history-section { padding: 12px 16px 90px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .history-header h2 { font-size: 1.2rem; color: #D6E1FF; }
        .clear-btn { background: none; border: 1px solid #3E4D75; color: #A6B9F0; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        #history { display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: #19213A; padding: 14px 18px; border-radius: 24px; border-left: 5px solid #4D71E0; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
        .history-item span { color: #B5C7FF; max-width: 75%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-item small { color: #5F73B0; font-size: 0.7rem; }
        .bottom-nav { position: fixed; bottom: 0; max-width: 400px; width: 100%; background: #11182F; backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 12px 8px 20px; border-top: 1px solid #2C3553; border-radius: 32px 32px 0 0; z-index: 20; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #6E80B0; transition: 0.2s; cursor: pointer; font-size: 0.7rem; font-weight: 500; }
        .nav-item.active { color: #8AA2FF; }
        .nav-item svg { width: 22px; height: 22px; display: block; stroke: currentColor; fill: none; }
        .nav-item#flashBtn svg, .nav-item#imageBtn svg circle, .nav-item#historyBtn svg { fill: currentColor; }
        .nav-item#imageBtn svg rect { fill: none; }
        #imageScan { display: none; }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
<div class="app">
    <header class="header"><div class="brand"><h1>Eris Scan</h1><p>AI QR Scanner</p></div></header>
    <section class="camera-section">
        <div id="reader"></div>
        <div class="scan-ui"><div class="scan-box"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div><div class="scan-line"></div></div><p class="scan-text">Align QR code within frame</p></div>
        <div class="translate-fab" id="translateBtn"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="2"><path d="M4 5h8M8 5c0 5-2 8-5 10m5-10c1 4 3 7 7 9M14 15l2-5 2 5M13 17h6" stroke="white" stroke-linecap="round"/></svg></div>
    </section>
    <div class="result-floating">
        <div class="result-text" id="result">Waiting for scan...</div>
        <div class="result-buttons"><button id="openLink" class="btn-primary">Open Link</button><button id="copyText" class="btn-outline">Copy</button><button id="shareBtn" class="btn-outline">Share</button></div>
        <button id="installApp" class="install-btn" style="display:none;">Install App</button>
    </div>
    <section class="history-section"><div class="history-header"><h2>Scan History</h2><button id="clearHistory" class="clear-btn">Clear</button></div><div id="history"></div></section>
    <input type="file" id="imageScan" accept="image/*">
    <nav class="bottom-nav">
        <div class="nav-item active" id="scanBtn"><svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 7h4l2-2h4l2 2h4v12H4z" stroke="currentColor" stroke-width="2" fill="none"/></svg><p>Scan</p></div>
        <div class="nav-item" id="flashBtn"><svg viewBox="0 0 24 24" width="22" height="22"><path d="M13 2L3 14h7l-1 8 10-12h-7z" fill="currentColor"/></svg><p>Flash</p></div>
        <div class="nav-item" id="imageBtn"><svg viewBox="0 0 24 24" width="22" height="22"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="9" cy="10" r="2" fill="currentColor"/></svg><p>Image</p></div>
        <div class="nav-item" id="historyBtn"><svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/></svg><p>History</p></div>
        <div class="nav-item" id="settingsBtn"><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82L12 22zM12 2v4"/></svg><p>Settings</p></div>
    </nav>
</div>
<script>
    (function() {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function(e) {
                navItems.forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                if (this.id === 'flashBtn') alert('💡 Flash toggle');
                if (this.id === 'imageBtn') document.getElementById('imageScan').click();
                if (this.id === 'historyBtn') document.querySelector('.history-section').scrollIntoView({ behavior: 'smooth' });
                if (this.id === 'scanBtn') document.querySelector('.camera-section').scrollIntoView({ behavior: 'smooth' });
            });
        });
        const historyDiv = document.getElementById('history');
        if (historyDiv.children.length === 0) {
            historyDiv.innerHTML = `<div class="history-item"><span>https://example.com/qr/123</span><small>now</small></div><div class="history-item"><span>WIFI:S:erisGuest;P:secure123;;</span><small>2h ago</small></div><div class="history-item"><span>BEGIN:VCARD...</span><small>yesterday</small></div>`;
        }
        document.getElementById('clearHistory').addEventListener('click', ()=>{ if(historyDiv) historyDiv.innerHTML = '<div class="history-item"><span>History cleared</span><small>now</small></div>'; });
        document.getElementById('openLink').addEventListener('click', ()=>{ alert('Open link: ' + (document.getElementById('result').innerText.includes('http') ? 'simulated' : 'Not a link')); });
        document.getElementById('copyText').addEventListener('click', ()=>{ navigator.clipboard?.writeText(document.getElementById('result').innerText).then(()=>alert('Copied!')); });
        document.getElementById('shareBtn').addEventListener('click', ()=>{ alert('Share simulated'); });
        document.getElementById('imageScan').addEventListener('change', function(e) { if (e.target.files.length) alert('📸 Image selected'); });
        document.getElementById('translateBtn').addEventListener('click', ()=>{ alert('🌐 Translate'); });
    })();
</script>
</body>
</html>
