<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eris Scan</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A0A08">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════
   ERIS SCAN — PREMIUM UI v3.0
   Clay #D97757 · Deep Carbon #1D1C16 · Sand #F5F2ED
═══════════════════════════════════════════════════════════════ */
:root {
    --clay:           #D97757;
    --clay-dark:      #C4623E;
    --clay-light:     #E8906F;
    --clay-ultra:     #F0A888;
    --clay-glow:      rgba(217,119,87,0.35);
    --clay-soft:      rgba(217,119,87,0.15);
    --carbon:         #1D1C16;
    --sand:           #F5F2ED;
    --sand-dark:      #EBE7E0;
    --sand-darker:    #DDD8D0;
    --sand-light:     #FAF8F5;
    --bg:             #0A0A08;
    --surface:        #141410;
    --surface-2:      #1E1E18;
    --text-primary:   #F5F2ED;
    --text-secondary: rgba(245,242,237,0.55);
    --text-tertiary:  rgba(245,242,237,0.30);
    --border:         rgba(245,242,237,0.08);
    --border-strong:  rgba(245,242,237,0.14);
    --nav-h:          62px;
    --nav-r:          40px;
    --ease-spring:    cubic-bezier(0.34,1.56,0.64,1);
    --ease-smooth:    cubic-bezier(0.23,1,0.32,1);
    --ease-expo:      cubic-bezier(0.16,1,0.3,1);
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }

body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
}

.app { width:100%; height:100vh; position:relative; overflow:hidden; background:var(--bg); }

/* ── HEADER ── */
.header { position:absolute; top:22px; left:20px; z-index:20; }

.brand h1 {
    font-size:21px; font-weight:700; letter-spacing:-0.6px;
    color:var(--sand-light); line-height:1.1;
}
.brand p {
    font-size:10px; font-weight:500; letter-spacing:1.2px;
    color:var(--clay); opacity:0.85; margin-top:3px; text-transform:uppercase;
}

/* ── CAMERA ── */
.camera-section { position:absolute; inset:0; }
#reader { width:100%; height:100%; }
#reader video { width:100%; height:100%; object-fit:cover; pointer-events:none; }

.camera-section::before {
    content:""; position:absolute; inset:0;
    background:
        radial-gradient(ellipse 80% 60% at 50% 50%, transparent 35%, rgba(10,10,8,0.65) 100%),
        linear-gradient(to bottom, rgba(10,10,8,0.72) 0%, transparent 26%, transparent 68%, rgba(10,10,8,0.78) 100%);
    pointer-events:none; z-index:5;
}

/* ── SCAN UI ── */
.scan-ui {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-53%);
    pointer-events:none; z-index:10;
}

/* ── SCAN BOX ── */
.scan-box { width:268px; height:268px; position:relative; border-radius:28px; }

.scan-box::before {
    content:""; position:absolute; inset:0;
    border-radius:26px; background:rgba(217,119,87,0.03);
}
.scan-box::after {
    content:""; position:absolute; inset:-3px; border-radius:30px;
    border:1px solid rgba(217,119,87,0.12); pointer-events:none;
    animation:boxBreathe 4s ease-in-out infinite;
}
@keyframes boxBreathe {
    0%,100% { opacity:0.6; border-color:rgba(217,119,87,0.10); }
    50%      { opacity:1;   border-color:rgba(217,119,87,0.24); }
}
.scan-box.detected::after { animation:detectPulse 0.6s var(--ease-expo) forwards; }
@keyframes detectPulse {
    0%   { border-color:rgba(100,220,100,0);   box-shadow:0 0 0 rgba(100,220,100,0); }
    35%  { border-color:rgba(100,220,100,0.9); box-shadow:0 0 40px rgba(100,220,100,0.3); }
    100% { border-color:rgba(217,119,87,0.12); box-shadow:none; }
}

/* ── CORNERS ── */
.corner {
    position:absolute; width:32px; height:32px;
    border-color:rgba(245,242,237,0.95); border-style:solid; border-width:0;
    animation:cornerPulse 3.5s ease-in-out infinite;
}
.tr { animation-delay:0.2s; }
.bl { animation-delay:0.4s; }
.br { animation-delay:0.6s; }
@keyframes cornerPulse { 0%,100% { opacity:0.82; } 50% { opacity:1; } }

.tl { top:0; left:0;     border-top-width:3px; border-left-width:3px;   border-top-left-radius:10px; }
.tr { top:0; right:0;    border-top-width:3px; border-right-width:3px;  border-top-right-radius:10px; }
.bl { bottom:0; left:0;  border-bottom-width:3px; border-left-width:3px;  border-bottom-left-radius:10px; }
.br { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; border-bottom-right-radius:10px; }

.scan-box.detected .corner { border-color:var(--clay); transition:border-color 0.2s ease; }

/* ── SCAN LINE ── */
.scan-line {
    position:absolute; left:10px; right:10px; height:2px; border-radius:2px;
    background:linear-gradient(90deg, transparent 0%, var(--clay-glow) 15%, var(--clay) 40%, var(--clay-ultra) 50%, var(--clay) 60%, var(--clay-glow) 85%, transparent 100%);
    animation:scanTravel 2.4s var(--ease-smooth) infinite; z-index:3;
}
.scan-line::before {
    content:""; position:absolute; inset:-2px 20% -2px 20%;
    background:inherit; filter:blur(4px); opacity:0.55;
}
.scan-line::after {
    content:""; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); width:8px; height:8px;
    background:var(--clay-ultra); border-radius:50%; filter:blur(3px); opacity:0.8;
}
@keyframes scanTravel {
    0%   { top:10px; opacity:0.5; }
    8%   { opacity:1; }
    92%  { opacity:1; }
    100% { top:calc(100% - 10px); opacity:0.5; }
}

/* ── SCAN HINT ── */
.scan-hint {
    position:absolute; bottom:-34px; left:50%; transform:translateX(-50%);
    white-space:nowrap; font-size:12px; font-weight:400;
    color:rgba(245,242,237,0.38); letter-spacing:0.2px;
}

/* ── RESULT CARD ── */
.result-floating {
    position:absolute; left:14px; right:14px; bottom:88px; z-index:40;
    animation:resultAppear 0.45s var(--ease-spring);
}
@keyframes resultAppear {
    0%   { opacity:0; transform:translateY(28px) scale(0.96); }
    100% { opacity:1; transform:translateY(0) scale(1); }
}
.result-card-inner {
    background:var(--sand-light); border-radius:24px; overflow:hidden;
    box-shadow:0 0 0 0.5px rgba(29,28,22,0.08), 0 2px 8px rgba(29,28,22,0.06), 0 12px 32px rgba(29,28,22,0.18), 0 32px 64px rgba(29,28,22,0.22);
}
.result-card-inner::before {
    content:""; display:block; height:3px;
    background:linear-gradient(90deg, var(--clay-dark), var(--clay), var(--clay-ultra));
}
.result-card-body { padding:16px 18px 18px; }

.result-type-tag {
    display:inline-flex; align-items:center; gap:5px;
    background:var(--clay-soft); color:var(--clay-dark);
    font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
    padding:3px 9px; border-radius:999px; margin-bottom:10px;
    border:1px solid rgba(217,119,87,0.2);
}
.result-type-tag::before {
    content:""; width:5px; height:5px;
    background:var(--clay); border-radius:50%; flex-shrink:0;
}

.result-text {
    font-family:'DM Mono', monospace; font-size:13.5px; font-weight:400;
    max-height:130px; overflow-y:auto; word-break:break-all;
    line-height:1.6; margin-bottom:14px; padding-right:6px;
    color:var(--carbon); letter-spacing:-0.1px;
}
.result-text::-webkit-scrollbar { width:3px; }
.result-text::-webkit-scrollbar-thumb { background:var(--clay); border-radius:4px; }
.result-text::-webkit-scrollbar-track { background:transparent; }

.result-divider { height:1px; background:var(--sand-darker); margin-bottom:14px; opacity:0.6; }

.result-buttons { display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:8px; }

.btn-primary {
    height:44px; border:none; border-radius:12px;
    background:linear-gradient(145deg, var(--clay), var(--clay-dark));
    color:var(--sand-light); font-family:'DM Sans',sans-serif;
    font-size:13.5px; font-weight:600; letter-spacing:-0.2px; cursor:pointer;
    position:relative; overflow:hidden;
    box-shadow:0 1px 0 rgba(255,255,255,0.15) inset, 0 6px 16px rgba(217,119,87,0.38), 0 2px 4px rgba(29,28,22,0.12);
    transition:all 0.28s var(--ease-smooth);
}
.btn-primary::before {
    content:""; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transition:left 0.5s ease;
}
.btn-primary:hover::before { left:100%; }
.btn-primary:hover {
    background:linear-gradient(145deg, var(--clay-light), var(--clay));
    box-shadow:0 8px 24px rgba(217,119,87,0.5), 0 2px 6px rgba(29,28,22,0.15);
    transform:translateY(-1px);
}
.btn-primary:active { transform:scale(0.96); }

.btn-outline {
    height:44px; border-radius:12px; border:1.5px solid var(--sand-darker);
    background:var(--sand); color:var(--carbon); font-family:'DM Sans',sans-serif;
    font-size:13px; font-weight:600; letter-spacing:-0.1px; cursor:pointer;
    transition:all 0.28s var(--ease-smooth); box-shadow:0 1px 3px rgba(29,28,22,0.06);
}
.btn-outline:hover { background:var(--sand-dark); border-color:var(--clay-ultra); color:var(--clay-dark); }
.btn-outline:active { transform:scale(0.96); }

.install-btn {
    width:100%; margin-top:10px; height:40px;
    border:1.5px solid rgba(217,119,87,0.3); border-radius:10px;
    background:rgba(217,119,87,0.08); color:var(--clay);
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
}

/* ── HISTORY ── */
.history-section {
    position:absolute; top:0; left:0; right:0; bottom:0;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:88px 16px 90px; background:var(--bg); scroll-behavior:smooth;
}
.history-section h2 { font-size:26px; font-weight:700; letter-spacing:-0.8px; color:var(--sand-light); line-height:1.1; }
.history-count { font-size:12px; color:var(--clay); font-weight:500; opacity:0.8; margin-top:2px; }
.history-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }

.clear-btn {
    background:var(--surface-2); border:1.5px solid var(--border-strong);
    color:var(--text-secondary); padding:7px 14px; border-radius:999px;
    font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer;
    transition:all 0.2s ease;
}
.clear-btn:hover { background:rgba(217,119,87,0.12); border-color:rgba(217,119,87,0.3); color:var(--clay); }
.clear-btn:active { transform:scale(0.95); }

.history-item {
    background:var(--surface); border:1px solid var(--border); border-radius:18px;
    margin-bottom:10px; cursor:pointer; position:relative; overflow:hidden;
    transition:all 0.28s var(--ease-smooth);
}
.history-item:hover { border-color:var(--border-strong); transform:translateY(-2px); box-shadow:0 12px 32px rgba(0,0,0,0.28); }
.history-item:active { transform:scale(0.97); }
.history-item::before {
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:linear-gradient(to bottom, var(--clay), var(--clay-dark));
    opacity:0; transition:opacity 0.2s ease;
}
.history-item:hover::before { opacity:1; }

.history-item-inner { padding:14px 16px 13px; display:flex; align-items:flex-start; gap:12px; }
.history-icon {
    width:36px; height:36px; border-radius:10px; background:var(--surface-2);
    border:1px solid var(--border); display:flex; align-items:center;
    justify-content:center; flex-shrink:0; font-size:16px; margin-top:1px;
}
.history-content { flex:1; min-width:0; }
.history-tag {
    display:inline-block; font-size:9px; font-weight:600; letter-spacing:0.8px;
    text-transform:uppercase; color:var(--clay); background:var(--clay-soft);
    border:1px solid rgba(217,119,87,0.18); padding:2px 6px; border-radius:4px; margin-bottom:4px;
}
.history-item p {
    font-size:14px; font-weight:500; line-height:1.45; word-break:break-word;
    color:var(--text-primary); display:-webkit-box;
    -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:4px;
}
.history-item small { font-size:11px; color:var(--text-tertiary); letter-spacing:0.1px; display:block; }

.history-section::-webkit-scrollbar { width:4px; }
.history-section::-webkit-scrollbar-thumb { background:rgba(217,119,87,0.35); border-radius:10px; }
.history-section::-webkit-scrollbar-track { background:transparent; }

.history-empty {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; padding:70px 20px; color:var(--text-tertiary); font-size:14px; text-align:center;
}
.history-empty-icon { font-size:40px; opacity:0.35; }

/* ── SETTINGS ── */
.settings-section {
    position:absolute; top:0; left:0; right:0; bottom:0;
    overflow-y:auto; padding:88px 16px 90px; background:var(--bg);
}
.settings-section h2 { font-size:26px; font-weight:700; letter-spacing:-0.8px; color:var(--sand-light); margin-bottom:22px; }

.settings-group {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; overflow:hidden; margin-bottom:14px;
}
.settings-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; border-bottom:1px solid var(--border);
    gap:12px; transition:background 0.15s ease;
}
.settings-item:last-child { border-bottom:none; }
.settings-item:active { background:var(--surface-2); }
.settings-item-label { font-size:14.5px; font-weight:500; color:var(--text-primary); letter-spacing:-0.1px; }
.settings-item-sub { font-size:12px; color:var(--text-tertiary); margin-top:2px; }

.toggle {
    width:44px; height:26px; background:var(--surface-2);
    border-radius:999px; position:relative; cursor:pointer;
    transition:background 0.3s ease; flex-shrink:0; border:1px solid var(--border-strong);
}
.toggle.on { background:var(--clay); border-color:var(--clay-dark); }
.toggle::after {
    content:""; position:absolute; top:2px; left:2px;
    width:20px; height:20px; background:var(--sand-light); border-radius:50%;
    transition:transform 0.3s var(--ease-spring); box-shadow:0 2px 6px rgba(0,0,0,0.22);
}
.toggle.on::after { transform:translateX(18px); }

.settings-version { text-align:center; font-size:11px; color:var(--text-tertiary); padding:16px; letter-spacing:0.2px; }
.settings-version span { color:var(--clay); opacity:0.7; }

/* ── NAVBAR ── */
.bottom-nav {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    width:86%; max-width:390px; height:var(--nav-h);
    background:rgba(245,242,237,0.97);
    backdrop-filter:blur(24px) saturate(200%); -webkit-backdrop-filter:blur(24px) saturate(200%);
    border-radius:var(--nav-r);
    box-shadow:0 0 0 0.5px rgba(29,28,22,0.09), 0 4px 16px rgba(29,28,22,0.10), 0 12px 40px rgba(29,28,22,0.14);
    display:flex; align-items:center; justify-content:space-around;
    padding:0 4px; z-index:50;
}
.nav-item {
    position:relative; display:flex; flex-direction:column;
    align-items:center; justify-content:center; flex:1; height:100%;
    border-radius:999px; color:#9E9B93; cursor:pointer;
    transition:color 0.28s var(--ease-smooth), transform 0.2s ease; gap:3px;
}
.nav-item.active { color:var(--clay); }
.nav-item:active { transform:scale(0.88); }
.nav-item.active::after {
    content:""; position:absolute; bottom:8px;
    width:4px; height:4px; border-radius:50%; background:var(--clay); opacity:0.7;
}
.nav-bg {
    position:absolute; inset:8px 4px; border-radius:20px;
    background:rgba(217,119,87,0.08); opacity:0; transition:opacity 0.28s ease; pointer-events:none;
}
.nav-item.active .nav-bg { opacity:1; }

.nav-icon {
    width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    position:relative; transition:transform 0.28s var(--ease-spring); flex-shrink:0;
}
.nav-item.active .nav-icon { transform:translateY(-1px) scale(1.05); }

.nav-item p {
    font-family:'DM Sans',sans-serif; font-size:9.5px; font-weight:500;
    letter-spacing:0.1px; color:inherit; line-height:1; margin:0;
}

/* ── ICONS ── */
#scanBtn .nav-icon::before,
#scanBtn .nav-icon::after { content:""; position:absolute; }
#scanBtn .nav-icon::before { inset:0; border:2px solid currentColor; border-radius:6px; }
#scanBtn .nav-icon::after {
    width:6px; height:6px; background:currentColor; border-radius:1.5px; top:4px; left:4px;
    box-shadow:0 0 0 1.5px currentColor, 11px 0 0 0 currentColor, 11px 0 0 1.5px currentColor,
               0 11px 0 0 currentColor, 0 11px 0 1.5px currentColor,
               5.5px 5.5px 0 -1.5px currentColor, 8px 8px 0 -1.5px currentColor;
}

#flashBtn .nav-icon::before {
    content:""; position:absolute; top:50%; left:50%;
    width:12px; height:20px; transform:translate(-50%,-50%);
    background:currentColor;
    clip-path:polygon(58% 0%,100% 0%,42% 48%,78% 46%,22% 100%,48% 53%,8% 55%);
}
#flashBtn.flash-on { color:#E8960A !important; }
#flashBtn.flash-on .nav-icon { filter:drop-shadow(0 0 5px rgba(232,150,10,0.65)); }

#imageBtn .nav-icon::before,
#imageBtn .nav-icon::after { content:""; position:absolute; }
#imageBtn .nav-icon::before {
    inset:0; border:2px solid currentColor; border-radius:5px;
    box-shadow:inset 5px -5px 0 -4px currentColor;
}
#imageBtn .nav-icon::after {
    bottom:3px; left:2px; right:2px; height:12px; background:currentColor;
    clip-path:polygon(0% 100%, 32% 28%, 50% 55%, 68% 22%, 100% 100%);
    opacity:0.8; border-radius:0 0 3px 3px;
}

#historyBtn .nav-icon::before,
#historyBtn .nav-icon::after { content:""; position:absolute; }
#historyBtn .nav-icon::before { inset:0; border:2px solid currentColor; border-radius:50%; }
#historyBtn .nav-icon::after {
    top:50%; left:50%; width:2px; height:7px; background:currentColor;
    border-radius:2px; transform-origin:bottom center;
    transform:translate(-50%,-100%) rotate(-35deg);
    box-shadow:2.5px 3px 0 -0.5px currentColor;
}
#historyBtn:hover .nav-icon::after { animation:tickForward 1.8s steps(12,end) infinite; }
@keyframes tickForward { to { transform:translate(-50%,-100%) rotate(325deg); } }

#settingsBtn .nav-icon::before,
#settingsBtn .nav-icon::after { content:""; position:absolute; }
#settingsBtn .nav-icon::before {
    inset:0; border-radius:50%; background:currentColor;
    -webkit-mask:
        radial-gradient(circle, transparent 30%, black 30%, black 42%, transparent 42%),
        conic-gradient(
            black 0deg,black 22deg,transparent 22deg,transparent 45deg,
            black 45deg,black 67deg,transparent 67deg,transparent 90deg,
            black 90deg,black 112deg,transparent 112deg,transparent 135deg,
            black 135deg,black 157deg,transparent 157deg,transparent 180deg,
            black 180deg,black 202deg,transparent 202deg,transparent 225deg,
            black 225deg,black 247deg,transparent 247deg,transparent 270deg,
            black 270deg,black 292deg,transparent 292deg,transparent 315deg,
            black 315deg,black 337deg,transparent 337deg,transparent 360deg
        );
    mask:
        radial-gradient(circle, transparent 30%, black 30%, black 42%, transparent 42%),
        conic-gradient(
            black 0deg,black 22deg,transparent 22deg,transparent 45deg,
            black 45deg,black 67deg,transparent 67deg,transparent 90deg,
            black 90deg,black 112deg,transparent 112deg,transparent 135deg,
            black 135deg,black 157deg,transparent 157deg,transparent 180deg,
            black 180deg,black 202deg,transparent 202deg,transparen
