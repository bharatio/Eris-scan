<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eris Scan</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A66C2">
    <link rel="stylesheet" href="style.css">

    <!-- QR Scanner -->
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <!-- Tesseract.js v5 — OCR Engine -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        /* Language select dropdown — instant, no network needed */
        .lang-select-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-select-wrap .lang-label {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
        }

        #langSelect {
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            color: #222;
            cursor: pointer;
            outline: none;
            padding: 2px 4px;
            border-radius: 6px;
            max-width: 130px;
        }

        #langSelect:focus {
            background: #f0f0f0;
        }

        /* Fix toLang text wrapping */
        .lang-box {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="brand">
                <h1>Eris Scan</h1>
                <p>AI QR Scanner</p>
            </div>
        </header>

        <section class="camera-section">
            <div id="reader"></div>

            <div class="translate-bar" id="translateBar" style="display: none;">
                <div class="lang-box" id="fromLang">Detecting...</div>
                <div class="lang-arrow">→</div>
                <!-- ✅ Native select — instant, no network, works on all phones -->
                <div class="lang-select-wrap">
                    <select id="langSelect">
                        <option value="en">🇬🇧 English</option>
                        <option value="hi">🇮🇳 Hindi</option>
                        <option value="es">🇪🇸 Spanish</option>
                        <option value="fr">🇫🇷 French</option>
                        <option value="de">🇩🇪 German</option>
                        <option value="ru">🇷🇺 Russian</option>
                        <option value="ar">🇸🇦 Arabic</option>
                        <option value="zh">🇨🇳 Chinese</option>
                        <option value="ja">🇯🇵 Japanese</option>
                        <option value="ko">🇰🇷 Korean</option>
                        <option value="ur">🇵🇰 Urdu</option>
                        <option value="bn">🇧🇩 Bengali</option>
                        <option value="ta">🇮🇳 Tamil</option>
                        <option value="te">🇮🇳 Telugu</option>
                        <option value="mr">🇮🇳 Marathi</option>
                        <option value="gu">🇮🇳 Gujarati</option>
                        <option value="pa">🇮🇳 Punjabi</option>
                        <option value="pt">🇧🇷 Portuguese</option>
                        <option value="it">🇮🇹 Italian</option>
                        <option value="fr">🇫🇷 French</option>
                    </select>
                </div>
            </div>

            <div class="scan-ui">
                <div class="scan-box">
                    <div class="corner tl"></div><div class="corner tr"></div>
                    <div class="corner bl"></div><div class="corner br"></div>
                    <div class="scan-line"></div>
                </div>
                <p class="scan-text">Align QR code within frame</p>
            </div>
        </section>

        <div class="result-floating">
            <div class="result-text" id="result">Waiting for scan...</div>
            <div class="result-buttons">
                <button id="openLink" class="btn-primary">Open Link</button>
                <button id="copyText" class="btn-outline">Copy</button>
                <button id="shareBtn" class="btn-outline">Share</button>
            </div>
            <button id="installApp" class="install-btn" style="display:none;">Install App</button>
        </div>

        <section class="history-section">
            <div class="history-header">
                <h2>Scan History</h2>
                <button id="clearHistory" class="clear-btn">Clear</button>
            </div>
            <div id="history"></div>
        </section>

        <input type="file" id="imageScan" accept="image/*, application/pdf" style="display:none">

        <nav class="bottom-nav">
            <div class="nav-item active" id="scanBtn">
                <div class="nav-icon"></div><p>Scan</p>
            </div>
            <div class="nav-item" id="flashBtn">
                <div class="nav-icon"></div><p>Flash</p>
            </div>
            <div class="nav-item" id="imageBtn">
                <div class="nav-icon"></div><p>Image</p>
            </div>
            <div class="nav-item" id="historyBtn">
                <div class="nav-icon"></div><p>History</p>
            </div>
            <div class="nav-item" id="settingsBtn">
                <div class="nav-icon"></div><p>Settings</p>
            </div>
        </nav>

        <!-- Translate FAB -->
        <div id="translateBtn" class="translate-btn">
            <svg viewBox="0 0 100 100" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
                <line x1="27" y1="28" x2="57" y2="28" stroke="#C25E3A" stroke-width="7" stroke-linecap="round"/>
                <line x1="42" y1="28" x2="42" y2="38" stroke="#C25E3A" stroke-width="7" stroke-linecap="round"/>
                <line x1="20" y1="42" x2="64" y2="42" stroke="#C25E3A" stroke-width="7" stroke-linecap="round"/>
                <line x1="22" y1="43" x2="10" y2="65" stroke="#C25E3A" stroke-width="7" stroke-linecap="round"/>
                <line x1="62" y1="43" x2="74" y2="65" stroke="#C25E3A" stroke-width="7" stroke-linecap="round"/>
                <line x1="42" y1="43" x2="42" y2="66" stroke="#C25E3A" stroke-width="7" stroke-linecap="round"/>
                <line x1="48" y1="78" x2="63" y2="38" stroke="#F5F2ED" stroke-width="8.5" stroke-linecap="round"/>
                <line x1="78" y1="78" x2="63" y2="38" stroke="#F5F2ED" stroke-width="8.5" stroke-linecap="round"/>
                <line x1="53" y1="63" x2="73" y2="63" stroke="#F5F2ED" stroke-width="7" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <script src="scan.js"></script>
</body>
  </html>
