<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A6CF7"/>
      <stop offset="100%" stop-color="#00C6FF"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Scan Frame -->
  <rect x="120" y="120" width="272" height="272"
        fill="none"
        stroke="#ffffff"
        stroke-width="28"
        rx="40"/>

  <!-- Scan Line -->
  <rect x="150" y="240" width="212" height="16"
        fill="#ffffff"
        opacity="0.9"/>

  <!-- Corner marks -->
  <rect x="110" y="110" width="40" height="10" fill="#ffffff"/>
  <rect x="110" y="110" width="10" height="40" fill="#ffffff"/>

  <rect x="362" y="110" width="40" height="10" fill="#ffffff"/>
  <rect x="392" y="110" width="10" height="40" fill="#ffffff"/>

  <rect x="110" y="392" width="40" height="10" fill="#ffffff"/>
  <rect x="110" y="362" width="10" height="40" fill="#ffffff"/>

  <rect x="362" y="392" width="40" height="10" fill="#ffffff"/>
  <rect x="392" y="362" width="10" height="40" fill="#ffffff"/>

</svg>
